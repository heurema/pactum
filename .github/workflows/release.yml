name: Release

# Tag a version to cut a release: `git tag v0.1.0-alpha.1 && git push origin v0.1.0-alpha.1`.
# pactum links tree-sitter (CGO), so binaries are built on NATIVE runners per
# platform (no cross-compilation), then archived with the docs + agent skill and
# attached to a GitHub Release with checksums.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.goos }}/${{ matrix.goarch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { runner: macos-latest, goos: darwin, goarch: arm64 }
          - { runner: macos-latest, goos: darwin, goarch: amd64 }
          - { runner: ubuntu-latest, goos: linux, goarch: amd64 }
          - { runner: ubuntu-24.04-arm, goos: linux, goarch: arm64 }
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build (native CGO)
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "1"
        run: |
          VER="${GITHUB_REF_NAME#v}"
          make build VERSION="$VER"

      - name: Package
        run: |
          VER="${GITHUB_REF_NAME#v}"
          DIST="pactum_${VER}_${{ matrix.goos }}_${{ matrix.goarch }}"
          mkdir -p "staging/${DIST}"
          cp bin/pactum "staging/${DIST}/"
          cp README.md SECURITY.md "staging/${DIST}/"
          cp -R docs "staging/${DIST}/docs"
          cp -R assets/agent-skills "staging/${DIST}/agent-skills"
          tar -C staging -czf "${DIST}.tar.gz" "${DIST}"

      - name: Upload archive
        uses: actions/upload-artifact@v4
        with:
          name: pactum_${{ matrix.goos }}_${{ matrix.goarch }}
          path: "*.tar.gz"
          retention-days: 1

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download archives
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Checksums
        run: |
          cd dist
          sha256sum *.tar.gz > checksums.txt
          cat checksums.txt

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/checksums.txt
          # Tags with a pre-release suffix (e.g. v0.1.0-alpha.1) publish as prereleases.
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
