name: Release

# pactum is pure Go (no CGO), so all five release targets cross-compile on a
# single ubuntu-latest runner via GOOS/GOARCH with CGO_ENABLED=0. No native
# per-platform runners or C toolchain required.
# Tag a version to cut a release: `git tag v0.1.0 && git push origin v0.1.0`.
# A v0.0.0-* tag is a smoke test: it builds + releases but only dry-runs npm publish.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: build all targets
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: "0"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Cross-compile
        # Targets: darwin/arm64  darwin/amd64  linux/amd64  linux/arm64  windows/amd64
        # Binaries: pactum-darwin-arm64  pactum-darwin-amd64  pactum-linux-amd64  pactum-linux-arm64  pactum-windows-amd64.exe
        # Archives: darwin_arm64.tar.gz  darwin_amd64.tar.gz  linux_amd64.tar.gz  linux_arm64.tar.gz  windows_amd64.tar.gz
        run: |
          VER="${GITHUB_REF_NAME#v}"
          PKG=github.com/heurema/pactum/internal/version
          COMMIT=$(git rev-parse --short HEAD)
          DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          LDFLAGS="-X $PKG.Version=$VER -X $PKG.Commit=$COMMIT -X $PKG.Date=$DATE"

          for t in darwin/arm64 darwin/amd64 linux/amd64 linux/arm64 windows/amd64; do
            export GOOS="${t%/*}"
            export GOARCH="${t#*/}"
            DIST="pactum_${VER}_${GOOS}_${GOARCH}"
            mkdir -p "staging/${DIST}"

            if [ "$GOOS" = "windows" ]; then
              go build -ldflags "$LDFLAGS" -o bin/pactum.exe ./cmd/pactum
              cp bin/pactum.exe "staging/${DIST}/"
              cp bin/pactum.exe "pactum-windows-amd64.exe"
            else
              go build -ldflags "$LDFLAGS" -o bin/pactum ./cmd/pactum
              cp bin/pactum "staging/${DIST}/"
              cp bin/pactum "pactum-${GOOS}-${GOARCH}"
            fi

            cp README.md SECURITY.md "staging/${DIST}/"
            cp -R docs/ "staging/${DIST}/docs"
            cp -R assets/agent-skills "staging/${DIST}/agent-skills"
            tar -C staging -czf "${DIST}.tar.gz" "${DIST}"
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: |
            pactum-darwin-arm64
            pactum-darwin-amd64
            pactum-linux-amd64
            pactum-linux-arm64
            pactum-windows-amd64.exe
            pactum_*_darwin_arm64.tar.gz
            pactum_*_darwin_amd64.tar.gz
            pactum_*_linux_amd64.tar.gz
            pactum_*_linux_arm64.tar.gz
            pactum_*_windows_amd64.tar.gz
          retention-days: 1

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download archives
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Checksums
        run: |
          cd dist
          sha256sum *.tar.gz > checksums.txt
          # checksums.json maps each bare binary (the npm launcher's download
          # target) to its sha256; baked into the npm package so the npm registry
          # is the launcher's root of trust, not the GitHub Release.
          sha256sum pactum-*-* | jq -Rn '[inputs | split("  ") | {(.[1]): .[0]}] | add' > checksums.json
          cat checksums.txt checksums.json

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/checksums.txt
            dist/pactum-*-*
            dist/checksums.json
          # Tags with a pre-release suffix (e.g. v0.1.0-alpha.1) publish as prereleases.
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true

  publish-npm:
    name: publish npm package
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Assemble package (bake checksums + stamp version)
        run: |
          VER="${GITHUB_REF_NAME#v}"
          # Bake the bare-binary sha256s into the package the launcher reads.
          ( cd dist && sha256sum pactum-*-* ) \
            | jq -Rn '[inputs | split("  ") | {(.[1]): .[0]}] | add' > npm/checksums.json
          # Stamp the real version over the 0.0.0 placeholder (matches the tag the
          # launcher builds its download URL from).
          node -e "const fs=require('fs'),p='npm/package.json',j=JSON.parse(fs.readFileSync(p));j.version='$VER';fs.writeFileSync(p,JSON.stringify(j,null,2)+'\n')"
          echo '--- npm/package.json ---'; cat npm/package.json
          echo '--- npm/checksums.json ---'; cat npm/checksums.json
          # Run the launcher's hermetic tests against the assembled package.
          node --test npm/bin/pactum.test.mjs

      - name: Publish to npm (dry-run for v0.0.0-* smoke tags)
        if: ${{ startsWith(github.ref_name, 'v0.0.0') }}
        working-directory: npm
        run: npm publish --access public --dry-run

      - name: Publish to npm
        if: ${{ !startsWith(github.ref_name, 'v0.0.0') }}
        working-directory: npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
