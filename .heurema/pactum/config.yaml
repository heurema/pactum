schema: pactum.config.v1
agents:
  - name: sonnet
    model: claude-sonnet-4-6
    effort: max
  - name: codex-xhigh
    model: gpt-5.5
    effort: xhigh
  - name: opus
    model: claude-opus-4-8
  - name: fable
    model: claude-fable-5
  - name: codex
    model: gpt-5.5
    effort: high
map:
  max_file_bytes: 500000
  code_index: auto
gate:
  scope_enforcement: block
review:
  max_rounds: 10
  patience: 2
  clean_rounds: 1
  panel:
    - fable
    - codex
