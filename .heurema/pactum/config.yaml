schema: pactum.config.v1
agents:
  - name: fable
    model: claude-fable-5
  - name: codex
    model: gpt-5.5
    effort: high
map:
  max_file_bytes: 500000
  code_index: auto
gate:
  scope_enforcement: block
review:
  max_rounds: 10
  patience: 2
  clean_rounds: 1
  budget:
    mode: warn
    max_tokens: null
  panel:
    - fable
    - codex
