version: v1alpha1
agents:
  - name: sonnet
    model: claude-sonnet-4-6
    effort: max
  - name: codex-xhigh
    model: gpt-5.5
    effort: xhigh
  - name: opus
    model: claude-opus-4-8
    effort: xhigh
  - name: codex
    model: gpt-5.5
    effort: high
map:
  max_file_bytes: 500000
  code_index: auto
out_of_scope: block
pipeline:
  contract_review:
    by: codex
    loop:
      max: 4
      patience: 2
      settle: 1
  execute:
    by: codex
  code_review:
    by: opus
