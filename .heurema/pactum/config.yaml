schema: pactum.config.v1
default_profile: balanced
project_map:
  refresh: auto
  max_file_bytes: 500000
  code_index: auto
limits:
  clarify:
    max_iterations: 5
    max_questions_per_round: 5
  execute:
    max_iterations: 10
  review:
    max_rounds: 4
budget:
  mode: warn
  max_usd: null
memory:
  enabled: true
  include_stale: warn
agents:
  cross_model_review: true
